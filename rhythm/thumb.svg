    <line x1="168" y1="58" x2="197" y2="190"/>
    <line x1="184" y1="58" x2="272" y2="190"/>
  </g>
  <line x1="40" y1="176" x2="280" y2="176" stroke="#b7fdff" stroke-width="5" filter="url(#glow)"/>
  <!-- ノーツ -->
  <rect x="88" y="150" width="46" height="12" rx="6" fill="#4ffcff" filter="url(#glow)"/>
  <rect x="176" y="118" width="38" height="10" rx="5" fill="#7dffa9" filter="url(#glow)"/>
  <rect x="182" y="80" width="26" height="40" fill="#7dffa9" opacity="0.35"/>
