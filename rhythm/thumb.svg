  <text x="160" y="34" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="26" font-style="italic" font-weight="900" fill="url(#ttl)" filter="url(#glow)">NEON BEATS</text>
  <text x="160" y="211" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffe066">♪ LOTSGAME オリジナル音ゲー ♪</text>
